trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'nourhankhalidd/assessment'
  imageTag: 'build-$(Build.BuildId)'

stages:

# ==========================
# Build Stage
# ==========================
- stage: Build
  displayName: 'Build Spring Boot Application'

  jobs:
  - job: MavenBuild
    displayName: 'Maven Build'

    steps:

    - checkout: self

    # Maven Cache
    - task: Cache@2
      displayName: 'Cache Maven Dependencies'
      inputs:
        key: 'maven | "$(Agent.OS)" | pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
        path: $(HOME)/.m2/repository

    # Build & Test
    - task: Maven@4
      displayName: 'Build & Test Application'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'

    # Publish Test Results
    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      inputs:
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        testRunTitle: 'Spring Boot Unit Tests'

    # Publish Artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish JAR Artifact'
      inputs:
        PathtoPublish: 'target'
        ArtifactName: 'spring-boot-app'
        publishLocation: 'Container'

# ==========================
# Docker Stage
# ==========================
- stage: Docker
  displayName: 'Docker Build Security Scan Push'

  dependsOn: Build

  jobs:
  - job: DockerBuild
    displayName: 'Docker Build'

    steps:

    - checkout: self

    # Docker Build
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        Dockerfile: '**/Dockerfile'
        repository: $(imageName)
        tags: |
          $(imageTag)
          latest

    # Trivy Scan
    - script: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy:0.72.0 \
          image \
          --severity HIGH,CRITICAL \
          --format table \
          --no-progress \
          --skip-version-check \
          --exit-code 0 \
          $(imageName):$(imageTag)
      displayName: 'Trivy Image Vulnerability Scan'

    # Push Docker Image
    - task: Docker@2
      displayName: 'Push Docker Image'
      inputs:
        command: push
        containerRegistry: 'dockerhub-connection'
        repository: $(imageName)
        tags: |
          $(imageTag)
          latest