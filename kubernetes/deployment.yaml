apiVersion: apps/v1
kind: Deployment

metadata:
  name: assessment-app
  labels:
    app: assessment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: assessment

  template:
    metadata:
      labels:
        app: assessment

    spec:
      containers:
      - name: assessment
        image: nourhankhalidd/assessment:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"